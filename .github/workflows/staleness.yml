name: Staleness Monitor

# Daily at 09:00 UTC, weekdays only. Finds stalled stories and reminds assignees.
on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch: {}   # allow manual runs while validating

permissions:
  issues: write
  contents: write   # needed to commit the updated agent-state.json

jobs:
  staleness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run staleness monitor
        env:
          AGENT_MODE: staleness
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m agent.orchestrator

      - name: Persist agent memory
        run: |
          if [[ -n "$(git status --porcelain agent-state.json)" ]]; then
            git config user.name  "scrum-master-agent[bot]"
            git config user.email "scrum-master-agent[bot]@users.noreply.github.com"
            git add agent-state.json
            git commit -m "chore(agent): update staleness state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
