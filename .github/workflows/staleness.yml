name: Staleness Monitor

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'UST-PACE'
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m agent.orchestrator
        env:
          AGENT_MODE: staleness
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      - name: Commit updated state
        run: |
          git config user.name "scrum-master-agent"
          git config user.email "agent@noreply"
          git add agent-state.json
          git diff --cached --quiet || \
            git commit -m \
            "chore: update agent state [skip ci]" && \
            git push
