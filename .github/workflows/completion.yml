name: Story Completion Checker

# Fires when an issue is closed. Flags closures that don't meet the definition of done.
on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  completion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run completion checker
        env:
          AGENT_MODE: completion
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # GITHUB_EVENT_PATH points at the issues event payload.
        run: python -m agent.orchestrator
